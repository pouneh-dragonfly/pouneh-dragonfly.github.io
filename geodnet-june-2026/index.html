  <div class="exec-summary">
    <div class="eyebrow">Executive Summary</div>
    <h1>The Precision Location Network That Already Has Customers</h1>
    <p style="font-family: 'Source Serif 4', Georgia, serif; font-style: italic; font-size: 22px; color: var(--gold-soft); margin: -16px 0 28px; line-height: 1.4;">The map every robot will read from.</p>
    <p class="lead">Most of what trades under the Decentralised AI banner is a promise about a business that might one day exist. GEODNET is the rarer thing: a network with real customers, a widening revenue base, and a mechanism that converts that revenue directly into rewards for token holders. It is also, by some distance, the largest network of its kind in the world.</p>
    <p>The problem GEODNET solves is mundane and enormous at once. Ordinary GPS, on a good day, places you within roughly two metres. That is fine for finding a restaurant and useless for a tractor that must not crush a row of vines, a drone threading between buildings, or a robotic mower that should cut your lawn and not your flowerbed. The technology that closes the gap to within a centimetre or two is called real-time kinematics, or RTK, and it has existed for decades. What did not exist, until recently, was a way to blanket the planet with the ground stations RTK requires without spending billions to do it.</p>
    <p>GEODNET built that coverage in roughly four years by borrowing the oldest idea in Crypto and pointing it at hardware. This approach, using Crypto incentives to build real-world infrastructure, is a subsector known as DePIN, or Decentralised Physical Infrastructure Networks. Rather than a single company funding and installing tens of thousands of base stations, ordinary people buy a small antenna, mount it on a roof, and are paid in GEOD tokens for the correction data it produces. The result is a network of more than twenty-two thousand base stations across over one hundred and fifty countries, assembled at a fraction of the cost an incumbent would have borne, and now roughly twice the combined size of the three legacy players who spent decades building theirs.</p>
    <p>What should interest investors is not only that GEODNET is another proof of how blockchain architecture lets a network scale at unprecedented speed, but the economics already on display. GEODNET is run by a non-profit foundation, so there is no equity and no dividend. Instead, eighty per cent of the revenue customers pay for data is used to buy GEOD on the open market and burn it permanently. Customer spending now runs at more than eleven million dollars on an annualised basis and has been growing at more than three times a year. Two years ago that figure was around six hundred thousand dollars. The network is, in effect, a buyback machine wired directly to demand from John Deere, DJI, TomTom and a lengthening list of robotics companies - and it is one of the few direct ways to take a long position on the arrival of physical AI.</p>
    <p>This report sets out how the network works, what the numbers actually say, where the moats are, and where the thesis could break. It is a conviction piece, and we hold a position. It is not a prediction that the market will agree with us soon.</p>
  </div>

  <!-- ========== 1 ========== -->
  <h1 class="section-title">1. The Two-Centimetre World</h1>

  <p class="lead">Almost every autonomous machine and robot being built today shares a hidden dependency: it needs to know exactly where it is.</p>

  <p>We have lived with GPS for so long that we tend to assume the problem of location is solved. It is not. The satellite constellations that most people rely on - the American GPS, Europe's Galileo, Russia's GLONASS, China's BeiDou - broadcast from roughly twenty thousand kilometres up, and by the time their signals have crossed the ionosphere and bounced around the atmosphere, the position they yield is accurate to something like two metres in good conditions and considerably worse among tall buildings. For a person holding a phone, two metres is invisible. For a machine or robot built to replace a human, two metres is the difference between competence and catastrophe.</p>

  <p>Consider what that gap rules out. An autonomous tractor applying pesticide to a field needs to follow the same lines to the centimetre, pass after pass, or it wastes chemicals and damages crops. A delivery drone descending to a doorstep cannot be satisfied with the right street. A robotic lawnmower that is confident only to within two metres will mow the neighbour's border. A surveying rig, a construction robot, an automated forklift, a humanoid stacking a shelf - each of them lives or dies on positioning that ordinary GPS simply cannot supply.</p>

  <p>The established fix is real-time kinematics. The idea is elegant: place a stationary receiver, a base station, at a precisely known fixed point, let it measure exactly how the satellite signals are being distorted at that moment, and broadcast a correction to any nearby device. Because the base station knows the truth about its own location, it can tell a moving rover how wrong the raw satellite fix is and by how much. Apply that correction and accuracy collapses from metres to a centimetre or two. The catch has always been geography. A base station only helps devices within a certain radius, so covering a country, let alone a planet, means building and maintaining an enormous, unglamorous estate of fixed antennas. That is expensive, slow, and exactly the sort of capital-intensive grind that has kept precise positioning a niche, premium service for thirty years.</p>

  <p>This is the unfashionable foundation beneath a very fashionable theme. The market spends its enthusiasm on the models and the robots themselves. Far less attention is paid to the boring layer that tells those robots where they are standing. GEODNET is a wager that, as physical intelligence moves from demonstration to deployment, the ground truth of position becomes infrastructure - and that whoever owns the cheapest, densest, most universal version of it owns something close to a toll road.</p>

  <!-- ========== 2 ========== -->
  <h1 class="section-title">2. How GEODNET Actually Works</h1>

  <p>GEODNET belongs to a category of Crypto projects known as decentralised physical infrastructure networks, or DePIN. The premise of DePIN is simple and, when it works, quietly radical. Instead of a corporation raising capital to build a network of physical things, the network issues a token and pays ordinary people to build it piece by piece. Each participant buys their own hardware, installs it, and earns tokens for the useful work it performs. The company never has to find the billions, negotiate the leases, or pull the permits. The crowd does it, motivated by being paid in a token that should appreciate as the network it is building becomes more valuable.</p>

  <p>In GEODNET's case the useful work is positioning. A host buys a small satellite mining station, a few hundred dollars of hardware, and mounts it somewhere with a clear view of the sky, typically a rooftop. The station listens to the satellite constellations overhead, measures how their signals are being distorted at that precise spot, and streams that correction data back to the network. In exchange, the host is paid in GEOD. When a customer somewhere within range needs centimetre positioning, the network serves them the correction from the nearest reliable station.</p>

  <p>Two design choices make this more than a clever way to crowdsource antennas. The first is geographic discipline. The network divides the world into hexagonal cells, and within each cell the rewards concentrate on the first reliable station rather than paying endlessly for redundant coverage of the same patch. That nudges hosts to extend the map outward into uncovered ground rather than piling up where coverage already exists. The second is hardware neutrality. GEODNET is not tied to a single manufacturer; stations from dozens of makers can join, which means the network does not depend on any one supplier and benefits from competition driving the cost of a station down over time.</p>

  <p>The economics for a host are deliberately brisk. A higher-specification station has historically earned enough GEOD to pay back its purchase price in a matter of months, after which it is a small, passive income stream attached to a rooftop. That payback is what bootstrapped the network so quickly: for the host, it is a modestly profitable gadget; for GEODNET, it is a node on a global utility that the foundation never had to pay for upfront. Token emissions to hosts are scheduled to reduce over time, on the theory that real customer demand, rather than token rewards, must eventually carry the network. We will return to that transition, because it is also one of the principal risks.</p>

  <div class="commentator">
    <div class="commentator-header">Context · The DePIN Lineage</div>
    <p>GEODNET is not the first network of this shape. The DePIN incentive model was pioneered with Helium from around 2019, and the pattern has since been pointed at mapping, energy, storage and compute with varying success. The honest history of the category is littered with networks that bootstrapped impressive hardware footprints and then discovered nobody wanted to pay for the output.</p>
    <p>What separates GEODNET from that graveyard is the demand side. The correction data it produces is not a speculative service in search of a buyer; it is a drop-in substitute for something agriculture, surveying and robotics companies already pay incumbents for, at materially lower cost. The network had paying customers early, and the question was never whether the data was wanted, only how fast the buyer base would compound.</p>
  </div>

  <h1 class="section-title">3. The Network in Numbers</h1>

  <p>The single most persuasive fact about GEODNET is the speed at which it overtook everyone else. The three established names in ground-based correction - Trimble, Topcon and Hexagon - have been building RTK networks for two to three decades and have together deployed in the region of twelve thousand base stations. GEODNET began building in earnest around 2022 and now operates more than twenty-two thousand base stations. It did in four years, and at a fraction of the cost, what the incumbents took thirty years and enormous capital budgets to assemble.</p>

  <p>Coverage now reaches more than eighty per cent of the world's population across over ten thousand cities, with the obvious exclusions of sanctioned territories such as China, Russia, Iran and North Korea. Across the United States, the map covers not only every major metropolitan area but the great majority of rural land as well, which matters because agriculture is one of the earliest and largest sources of demand. This is no longer an experiment with promising coverage in a handful of markets. It is a genuinely global utility.</p>

  <p>The growth on the demand side is, if anything, more striking than the hardware. When VanEck published its investment thesis in early 2024, the network had roughly five thousand nodes across sixty countries and was generating annualised recurring revenue of about six hundred and thirty thousand dollars. As of mid-2026, customer spending runs at more than eleven million dollars on an annualised basis. That is something close to a seventeen-fold increase in roughly two years, on a node count that itself more than quadrupled. The supply side and the demand side compounded together.</p>

  <p>Who is actually paying? The customer roster reads like a directory of the physical-AI economy. In agriculture, John Deere uses precise correction in its auto-steering and in a newer unmanned spraying system, and the United States Department of Agriculture has been subsidising farmers to adopt precision techniques that depend on networks like this one. In autonomy, TomTom, which supplies mapping to almost every serious self-driving programme, draws on GEODNET data to sharpen its maps. In consumer robotics, the robotic lawnmower category alone is on track to ship around a million units this year from makers such as Yarbo and Sunseeker, the better ones leaning on centimetre positioning. In drones, the world's largest manufacturer, DJI, builds GEODNET compatibility into many of its models. A robotic mule hauling grapes through a vineyard, an automated sprayer threading between vines in Napa, a surveyor's rig on a building site - all of them are potential meters running on the same network.</p>

  <h1 class="section-title">4. The Token Buy-and-Burn Engine</h1>

  <p>Here is where GEODNET stops resembling a typical software company and starts resembling something stranger and, for a token holder, rather better. The network is operated by a non-profit foundation. There are no shares, no equity, no dividend. So the question that should immediately occur to any investor is the right one: if there is no equity, how does the value of a growing business reach the people who own the token?</p>

  <p>The answer is a buy-and-burn. Eighty per cent of the revenue customers pay for data is used to purchase GEOD, the network's Crypto token, on the open market, and those purchased tokens are then permanently destroyed. The remaining fifth of revenue funds the foundation's engineering and business development. This is, in spirit, a share buyback, but a more aggressive one, because a burned token can never be reissued, whereas a repurchased share sits in treasury and can return. Every dollar of customer demand becomes a standing bid for the token followed by a permanent reduction in supply.</p>

  <p>Crucially, none of this requires trust. Because the purchases and burns happen onchain, anyone can watch them. The cadence is visible in real time, and through the spring of 2026 the network was burning in the region of one hundred and seventy thousand dollars of GEOD in a single strong week. More than fifty-five million GEOD have now been removed from supply since inception. The link between usage and scarcity is not a narrative the team asks you to believe; it is a public ledger you can audit.</p>

  <h1 class="section-title">5. The Moats</h1>

  <p>A fast-growing network is interesting. A fast-growing network that is hard to dislodge is very attractive to us as investors. GEODNET's defensibility rests on several reinforcing advantages, and it is worth being precise about each rather than waving at the word "monopoly".</p>

  <h3>Network Effects And The Shape Of A Telecom</h3>
  <p>Positioning coverage is a classic network-effect business. The denser and more universal the network, the more useful it is to any given customer, and the more customers it attracts, the more revenue flows to hosts, which funds still denser coverage. Networks shaped like this - telecoms, essentially - tend toward natural monopoly, because a second network offering the same ubiquity has to replicate the whole estate before it is competitive at all. GEODNET is already the largest and the fastest growing, which in a network-effect market is the position you want to be defending rather than attacking.</p>

  <div class="pullquote">
    <p>"This thing looks like a natural telecom. Telecoms naturally form monopolies."</p>
    <p class="attribution">Kyle Samani — All-In Liquidity Summit, June 2026</p>
  </div>

  <h3>A Structural Cost Advantage</h3>
  <p>Because hosts fund the hardware and earn Crypto tokens rather than cash salaries, GEODNET carries the lowest cost structure in the industry by a wide margin. Building equivalent coverage the old way - a company buying, installing and maintaining tens of thousands of stations - is estimated to cost several times more. That gap lets GEODNET undercut incumbent pricing while still funding aggressive buybacks, and a competitor cannot simply match the price without first matching the cost structure, which means adopting the very token model they are competing against.</p>

  <div class="commentator">
    <div class="commentator-header">Commentator · On Replacement Cost</div>
    <p>The cleanest way to think about a network like this is the one seasoned infrastructure investors apply to power plants and toll roads: what would it cost to rebuild from scratch, and is the asset trading above or below that figure? GEODNET's twenty-two thousand stations were assembled for a small fraction of what an incumbent would have spent in capital, permits and labour to reach the same coverage.</p>
    <p>An acquirer wanting this footprint cannot buy it cheaply, and cannot build it quickly. The decentralised model is not merely a clever financing trick; it is the moat, because it permanently lowers the cost of the one thing competitors must replicate.</p>
  </div>

  <h3>Hardware Neutrality And Switching Costs</h3>
  <p>Because the network admits stations from many manufacturers, it is not hostage to a single supplier and benefits from falling hardware costs as makers compete. On the demand side, once a fleet operator or an equipment manufacturer has integrated GEODNET corrections into their product and their workflow, switching to an alternative means re-engineering and re-testing for a service that is, at best, no cheaper. The sales cycle compounds in GEODNET's favour: the people who run precision at John Deere, DJI and TomTom move in a small world, and a network that becomes the default among them is hard to displace by reputation alone.</p>

  <h3>Capital Returned, Not Consumed</h3>
  <p>Finally, the buy-and-burn is itself a moat of a kind, because it aligns the token holder with the network's success in a way that pure governance tokens never manage. The asset is not a claim on a someday cash flow; it is a live instrument absorbing real revenue today. That makes the thesis legible to exactly the large pool of seasoned investor capital that normally keeps its distance from Crypto.</p>

  <h1 class="section-title">6. The Valuation Gap</h1>

  <p>As of mid-June 2026, GEOD trades at around twenty-two cents, for a circulating market capitalisation of roughly ninety-five million dollars and a fully diluted valuation of a little over two hundred million. Set that against a network throwing off more than eleven million dollars of annualised customer spending, growing above three times a year, of which four-fifths is converted straight into token buybacks. On a circulating basis the network trades at single-digit multiples of the revenue it is already returning to holders, for an asset compounding at triple-digit rates. That is not the pricing of a business the market believes in; it is the pricing of one the market has not yet bothered to examine.</p>

  <p>The natural public comparison is Trimble, the listed geospatial company whose correction network is similar in node count to where GEODNET stood two years ago and whose equity has historically traded at close to thirty times free cash flow. GEODNET is the purer expression of the same value - a network that owns the data without owning the factories, the salesforce or the inventory - and it is growing far faster, yet it trades at a fraction of that multiple. Part of the discount is the simple fact of being a Crypto token in a nervous market; part is genuine early-stage venture risk, which the next section treats honestly. But a meaningful part is simply that it has stayed under the radar for most investors. That Kyle Samani, the founder of Multicoin, recently chose GEODNET as his pick at the All-In Liquidity Summit should bring fresh eyes, and fresh capital, to help close the discount.</p>

  <p>Trimble offers a tempting shortcut to a price target. Applying its roughly thirty times multiple to GEODNET's eight million dollars of annual buy-and-burn would imply a market capitalisation around two and a half times today's. We think that shortcut is unwise, because the two businesses differ so sharply in maturity, scale and growth. If anything, the comparison cuts the other way: GEODNET is growing far faster and already runs roughly double the node count, which a reasonable observer could argue makes it worth substantially more, not less. The most cited external research, VanEck's, lends weight to that view, modelling a per-token value of 9.58 dollars by 2030 on the assumption that the network captures a modest single-digit share of the global correction market at an infrastructure multiple. That figure is an illustration resting on a chain of assumptions, not a forecast. The Dragonfly view is narrower and, we think, sturdier: a network growing this fast, returning capital this transparently, at this valuation, is mispriced relative to what it already is, before any heroic assumptions about what it becomes.</p>

  <h1 class="section-title">7. Momentum</h1>

  <p>The case does not rest on a single moment but on a steady accumulation of evidence that the network is maturing from a Crypto curiosity into recognised infrastructure. A few markers of the last eighteen months are worth setting down in order.</p>

  <p>VanEck, one of the more credible institutional names in digital assets, took a direct position in GEOD through the foundation and published a detailed bull thesis. Through 2024 and 2025 the token went multichain, extending from its original home on Polygon to Solana through a governance-approved bridge, which widened its reach into the deepest pool of DePIN activity in Crypto. In late 2025 the network struck a partnership with a major Indian energy group, planting a flag in one of the largest untapped markets for precise positioning. In early 2026 a Messari report validated the broader DePIN sector and singled out GEODNET's revenue growth even through a period of token-price weakness. By the spring the network had manufactured its first base stations in the United States, hardening a supply chain that had been a quiet vulnerability. And on the second of June 2026, GEODNET became the rare DePIN asset to be pitched from the stage of a mainstream investor event, when Kyle Samani presented it at the All-In Liquidity Summit in Napa.</p>

  <div class="commentator">

    <p>It is worth being candid about how that pitch landed. In a room of generalist equity and biotech investors, GEODNET placed last in the audience vote, behind a casino operator and a power producer. The reason was not the business but the wrapper: a room of traditional managers found a Crypto token the hardest of the four to size and to hold, and several said as much.</p>
    <p>We read that reaction as confirmation rather than warning. The discount exists precisely because the natural buyer of infrastructure with these characteristics is not yet comfortable owning it in this form. That discomfort is the opportunity. As the wrapper becomes more familiar and the revenue record lengthens, the buyer base widens into capital that today cannot participate.</p>

  <h1 class="section-title">8. Risks</h1>

  <p>This is still a relatively early-stage Crypto protocol, and it carries a host of risks. These are the ways the thesis could be wrong, set out plainly.</p>

  <h3>Satellites From Above</h3>
  <p>The most cited bear argument is that low-earth-orbit constellations could one day deliver centimetre positioning from space, removing the need for ground stations entirely. It is a real long-term question. The counter is cost and physics: launching and maintaining satellites is enormously more expensive than a few hundred dollars of rooftop hardware, and space-based delivery is far more power-hungry, which matters acutely for battery-constrained devices like drones. For the foreseeable future, ground-based correction remains the cheaper and more energy-efficient answer, and a hybrid future in which both coexist is at least as likely as outright replacement. But an investor should hold this risk consciously rather than dismiss it.</p>

  <div class="pullquote">
    <p>"You're just not going to compete on cost with GEODNET."</p>
    <p class="attribution">Kyle Samani, on satellite alternatives — June 2026</p>
  </div>

  <h3>The Halving And The Death-Spiral Scenario</h3>
  <p>Host rewards are designed to reduce on a schedule. The benign reading is that real customer revenue takes over from token emissions as the reason to host a station. The malign reading, which VanEck itself flagged, is a metastable system: if emissions fall faster than revenue grows, host economics weaken, stations go dark, coverage degrades, customers leave, the burn shrinks, the token falls, and the whole flywheel runs in reverse. The network's defence is the speed of revenue growth, which so far has comfortably outpaced the tapering of rewards. This is the risk we watch most closely, because it is the one the model itself contains.</p>

  <h3>Legal And Structural Questions</h3>
  <p>The buy-and-burn depends on a foundation continuing to direct the great majority of revenue to the token, and on that structure remaining sound under evolving regulation. A change to the eighty per cent policy, or a regulatory determination that reshaped how revenue may be used, would alter the core mechanism. Token-based value accrual remains a developing area of law in most jurisdictions, and GEODNET is not immune to that uncertainty.</p>

  <h3>Competition, Concentration And Market Beta</h3>
  <p>An incumbent or a well-capitalised newcomer could attempt to replicate the token model, though doing so means embracing the economics they are trying to beat. Revenue, while growing fast, still rests on a relatively concentrated set of large customers, so the loss or hesitation of a flagship name would be felt. And as a liquid Crypto asset, GEOD carries the market's beta whether or not the network deserves it: through early June 2026 the token fell with the broader DePIN complex even as its fundamentals improved, and it trades well below its early-2025 high. Liquidity is also genuinely thin. Building or exiting a position of any size moves the price, a constraint a serious allocator must respect on the way in and the way out alike.</p>

  <h1 class="section-title">9. Dragonfly's Approach</h1>

  <div class="closing" style="margin-top:0;">
    <div class="closing-mark">Dragonfly Investment Approach</div>
    <p>As long-term investors, it is immaterial — perhaps even advantageous — that token investing is not yet the consensus view.</p>
  </div>

  <p>Dragonfly Asset Management has been investing across the liquid Crypto landscape for close to four years, and Decentralised AI, of which decentralised physical infrastructure is now a central part, has been our highest-conviction thematic exposure for much of that time. The Fund is constructed as a diversified basket of liquid tokens. For each holding we weigh the potential upside against protocol-specific and subsector-specific risks, and we size the position to that balance, with the aim that the basket as a whole delivers venture-style returns through asymmetric upside on the winners. Holding only liquid tokens is a deliberate choice: it lets us reallocate as the landscape shifts, towards a new Decentralised AI leader, an emerging DePIN network, or an opportunity we have not yet identified. The sector moves fast, and in a category this early, liquidity matters even more than breadth.</p>

  <p>Within that book, GEODNET is a high-conviction holding for four reasons. First, it is the category leader in a structurally large market: the largest RTK network in the world, already roughly twice the combined size of the incumbents it is displacing, in a positioning layer that physical AI cannot do without. Second, the revenue is real, fast-growing and returned to holders transparently, with eighty per cent of customer spending converted into an onchain buy-and-burn that anyone can audit. Third, the moat compounds, through network effects, the lowest cost structure in the industry, and switching costs that deepen with every manufacturer that integrates the data. Fourth, the entry price is asymmetric: single-digit multiples of revenue already returned, against a comparator in Trimble that trades many times higher and a demand backdrop, from John Deere to DJI, that is only now accelerating.</p>

  <p>Rarely do we see all four of these qualities in one asset. Most protocols we evaluate have one or two. We size GEODNET with the category's risks firmly in view, building patiently given thin liquidity, watching the relationship between revenue growth and the tapering of host rewards rather than the token price, and judging the network by the onchain burn and the customer ramp. GEODNET will not be the flashiest trade in the cycle; infrastructure compounds slowly, and the team has never been promotional. That is precisely what makes the position attractive. The market is repricing it now, and we do not believe it has finished.</p>

  <h1 class="section-title">10. Conclusion</h1>

  <p>Strip away the token mechanics and the Crypto framing and what remains is an old-fashioned infrastructure story. A network of fixed assets, built faster and cheaper than any incumbent managed, now the largest of its kind in the world, throwing off rapidly growing revenue from blue-chip customers, with that revenue wired directly back to the owners of the network. The only unusual features are that the assets sit on strangers' rooftops and the dividend takes the form of a permanent reduction in supply.</p>

  <p>The market currently prices GEODNET as a speculative token in a nervous sector. We think it is closer to a toll road on the movement of machines through physical space, captured early and cheaply because the buyers who belong in it have not yet arrived. The risks are real and we have named them. But the central fact is hard to argue with: this is a network with customers, growth and a transparent link between the two, available at single-digit multiples of the cash it already returns.</p>
